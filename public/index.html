<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description"
    content="Портфолио веб‑разработчика Аси. Фронтенд‑разработка с использованием HTML5, CSS, JavaScript, Vue 3. Освоение fullstack‑направления. Проекты для сферы образования и медицины.">
  <link rel="icon" href="<%= BASE_URL %>favicon.ico">
  <link rel="stylesheet" href="style.css">
  <title>Ася — веб‑разработчик: проекты и портфолио</title>


</head>

<body>
  <noscript>
    <div class="noscript-warning">
      <h2>JavaScript отключён</h2>
      <p>Это портфолио полностью функционально без JavaScript, но некоторые визуальные эффекты могут быть недоступны.
      </p>
      <p>Если вы хотите включить JavaScript:</p>
      <ol>
        <li>Откройте настройки вашего браузера.</li>
        <li>Перейдите в раздел «Безопасность» или «Приватность».</li>
        <li>Найдите опцию «JavaScript» и включите её.</li>
      </ol>
      <p>Продолжайте просмотр — все проекты и контакты доступны!</p>
    </div>
  </noscript>

  <div id="app"></div>
  <!-- built files will be auto injected -->
</body>

</html>

<style lang="scss">
  .noscript-warning {
  background-color: #fff9e6;
  border-left: 4px solid #ffc107;
  padding: 16px 20px;
  margin: 20px 0;
  font-family: Arial, sans-serif;
  line-height: 1.5;
}

.noscript-warning h2 {
  color: #e67700;
  margin-top: 0;
  font-size: 1.2em;
}

.noscript-warning ol {
  margin-left: 20px;
}

.noscript-warning p {
  margin-bottom: 8px;
}

/* Скрываем сообщение, если JS включён (опционально) */
body:has(script) .noscript-warning {
  display: none;
}

</style>
